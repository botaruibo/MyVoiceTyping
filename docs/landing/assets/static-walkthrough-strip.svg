<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MyVoiceTyping static walkthrough strip</title>
  <desc id="desc">A clearly labeled static walkthrough strip showing five MyVoiceTyping product cards. This is not a real recording or GIF.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.48" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#101828" flood-opacity="0.14"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="456" height="256.5" rx="22"/>
    </clipPath>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1260" cy="130" r="230" fill="#dbeafe" opacity="0.55"/>
  <circle cx="210" cy="770" r="260" fill="#ede9fe" opacity="0.72"/>

  <text x="80" y="92" fill="#101828" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="760">
    MyVoiceTyping static walkthrough
  </text>
  <text x="80" y="136" fill="#475467" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500">
    Hold to speak → local processing → paste usable Chinese / mixed Chinese-English text
  </text>
  <text x="80" y="176" fill="#b42318" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="680">
    Static walkthrough only · not a real recording / GIF
  </text>

  <g transform="translate(80 230)" filter="url(#shadow)">
    <rect width="456" height="346" rx="26" fill="#ffffff"/>
    <g clip-path="url(#cardClip)">
      <image href="01-hold-to-speak.png" width="456" height="256.5" preserveAspectRatio="xMidYMid slice"/>
    </g>
    <text x="26" y="306" fill="#101828" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="720">1. Hold to speak</text>
  </g>

  <g transform="translate(572 230)" filter="url(#shadow)">
    <rect width="456" height="346" rx="26" fill="#ffffff"/>
    <g clip-path="url(#cardClip)">
      <image href="02-spoken-to-polished-text.png" width="456" height="256.5" preserveAspectRatio="xMidYMid slice"/>
    </g>
    <text x="26" y="306" fill="#101828" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="720">2. Spoken → polished</text>
  </g>

  <g transform="translate(1064 230)" filter="url(#shadow)">
    <rect width="456" height="346" rx="26" fill="#ffffff"/>
    <g clip-path="url(#cardClip)">
      <image href="03-ai-coding-prompts.png" width="456" height="256.5" preserveAspectRatio="xMidYMid slice"/>
    </g>
    <text x="26" y="306" fill="#101828" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="720">3. AI Coding prompt</text>
  </g>

  <g transform="translate(326 610)" filter="url(#shadow)">
    <rect width="456" height="220" rx="26" fill="#ffffff"/>
    <g clip-path="url(#cardClip)">
      <image href="04-local-first-privacy.png" width="456" height="256.5" preserveAspectRatio="xMidYMid slice"/>
    </g>
    <text x="26" y="190" fill="#101828" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="720">4. Local-first boundary</text>
  </g>

  <g transform="translate(818 610)" filter="url(#shadow)">
    <rect width="456" height="220" rx="26" fill="#ffffff"/>
    <g clip-path="url(#cardClip)">
      <image href="05-open-app-model-dataset.png" width="456" height="256.5" preserveAspectRatio="xMidYMid slice"/>
    </g>
    <text x="26" y="190" fill="#101828" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="720">5. App / model / dataset</text>
  </g>

  <text x="80" y="858" fill="#475467" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="560">
    github.com/botaruibo/MyVoiceTyping · macOS Chinese / mixed Chinese-English · local polishing model · Self-Evolution
  </text>
</svg>
