    <text x="180" y="27" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#1e293b">本地隐私</text>
    <rect x="296" y="0" width="142" height="42" rx="21" fill="white" opacity="0.95"/>
    <text x="321" y="27" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#1e293b">中英混合</text>
    <rect x="456" y="0" width="128" height="42" rx="21" fill="white" opacity="0.95"/>
    <text x="486" y="27" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#1e293b">可审查</text>
