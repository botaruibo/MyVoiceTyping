<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="MyVoiceTyping social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.9"/>
  <circle cx="1080" cy="120" r="220" fill="#4f46e5" opacity="0.18"/>
  <circle cx="920" cy="560" r="260" fill="#0891b2" opacity="0.16"/>

  <g transform="translate(72 60)">
    <rect x="0" y="0" width="52" height="52" rx="15" fill="#3b82f6"/>
    <rect x="18" y="16" width="17" height="20" rx="2" fill="none" stroke="white" stroke-width="3"/>
    <text x="72" y="36" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">MyVoiceTyping</text>
  </g>

  <g transform="translate(72 158)">
