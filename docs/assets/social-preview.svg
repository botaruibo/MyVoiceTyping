      <circle cx="18" cy="18" r="18" fill="#3b82f6"/>
      <text x="13" y="25" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="white">3</text>
      <text x="54" y="25" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#0f172a">本机自进化</text>
