    <circle cx="38" cy="34" r="7" fill="#fb7185"/>
    <circle cx="62" cy="34" r="7" fill="#f59e0b"/>
    <circle cx="86" cy="34" r="7" fill="#34d399"/>
    <circle cx="235" cy="154" r="76" fill="url(#accent)"/>
    <circle cx="235" cy="154" r="54" fill="none" stroke="white" stroke-width="3" opacity="0.85"/>
    <rect x="218" y="136" width="34" height="40" rx="5" fill="none" stroke="white" stroke-width="5"/>

    <g transform="translate(54 264)">
      <circle cx="18" cy="18" r="18" fill="#3b82f6"/>
      <text x="13" y="25" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="white">1</text>
      <text x="54" y="25" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#0f172a">按住说话</text>
