    <text x="24" y="31" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#083344">Typeless 平替方向 · 开源 · 本地优先 · 0 费用</text>
  </g>

  <text x="72" y="286" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="66" font-weight="800" fill="#f8fafc">中文语音输入，</text>
  <text x="72" y="365" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="66" font-weight="800" fill="#f8fafc">越用越懂你。</text>
  <text x="72" y="424" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="27" fill="#cbd5e1">macOS · 中文 / 中英混合 · App / 模型 / 数据集公开</text>
  <text x="72" y="462" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" fill="#a5f3fc">Self-Evolution：voice_history → MLX LoRA → GGUF Q4</text>

